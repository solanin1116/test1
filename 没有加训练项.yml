name: "吉他音箱真实模拟与数字建模对比 ABX 测试"
welcome:
  description: |
    # 🎧 听音测试说明 (ABX 盲听)
    欢迎参与本次双盲听觉感知测试！您的专业反馈对本研究至关重要。

    **📝 测试规则**
    本环节为标准的 ABX 盲听测验。在每道题中，您将听到 A、B、X 三个音频：
    * **A 和 B** 是两个不同的参考音频（分别代表真实音箱与数字建模）。
    * **X** 是未知音频（它在底层数据上与 A 或 B 完全相同）。
    * **您的任务**：通过对比试听，判断未知音频 X 究竟是 A 还是 B。

    **⏱️ 测验篇幅**
    本测试共计 **18 题**，预计需要您投入约 **8-10 分钟**的专注时间。

    **🎛️ 听音环境要求（重要）**
    为了保证实验数据的客观与严谨，请务必在您**熟悉的安静监听环境**下进行。强烈建议佩戴**专业有线耳机**或使用**高品质监听音箱**。（请尽量避免使用手机外放，或带有重度降噪及空间音频算法的蓝牙设备）。

    **💡 听音建议**
    如果您在某道题上反复盲切后依然难以抉择，请不要过度纠结。差异极其微小属于预期内的正常现象，请相信您的**第一直觉**并果断作答，以保持耳朵的敏锐度，避免听觉疲劳。

    **📥 提交方式**
    完成全部 18 题后，系统将自动跳转至结果页面。请务必点击页面上的 **“Share（分享）”** 按钮，**复制生成的完整链接**，并将该长链接发送给研究者。


