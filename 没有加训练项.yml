tests:
  # === 18道题深度交错排序 (repeat 均设为 1) ===

  - name: "Q1. 整体对比 - Clean (AM4 vs Real)"
    testType: ABX
    options:
      - Overall_0_RealAmp_CL
      - Overall_0_AM4_CL
    repeat: 1

  - name: "Q2. 分层对比 - Preamp OD (Digi vs Real)"
    testType: ABX
    options:
      - Layering_Pre_Real_OD
      - Layering_Pre_Digi_OD
    repeat: 1

  - name: "Q3. 整体对比 - HighGain (NAM vs Real)"
    testType: ABX
    options:
      - Overall_0_RealAmp_HG
      - Overall_0_NAM_HG
    repeat: 1

  - name: "Q4. 分层对比 - Cabinet Clean (Digi vs Real)"
    testType: ABX
    options:
      - Layering_Cab_Real_CL
      - Layering_Cab_Digi_CL
    repeat: 1

  - name: "Q5. 整体对比 - OverDrive (KPA vs Real)"
    testType: ABX
    options:
