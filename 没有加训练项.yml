name: "吉他音箱真实模拟与数字建模对比 ABX 测试"
welcome:
  description: |
    # 欢迎参与听音测试
    本测试旨在对比真实电吉他音箱与数字建模音箱的声音差异。
    测试共分为两部分：整体对比与分层对比，总计 18 题。
    **请务必使用高质量耳机并在安静环境下进行。**
  form:
    - name: 您的听音设备类型
      inputType: select
      options:
        - 头戴式耳机 (Over-ear)
        - 入耳式耳机 (In-ear)
        - 监听音箱 (Studio Monitors)
    - name: 您是否有吉他弹奏经验？
      inputType: select
      options:
        - 是
        - 否

